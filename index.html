<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Controle de Caixa</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        button { padding: 10px 20px; font-size: 16px; margin: 20px; }
        input, select { padding: 5px; margin: 5px 0; width: 300px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        #menu { text-align: center; }
        #caixaForm, #extratoTable { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle de Caixa</h1>
    
    <!-- Menu -->
    <div id="menu">
        <button onclick="mostrarFormulario()">Preencher Movimentações</button>
        <button onclick="mostrarExtrato()">Movimentações / Extrato</button>
    </div>
    
    <!-- Formulário de preenchimento (Página 1) -->
    <div id="caixaForm">
        <h2>Preencher Movimentações do Caixa</h2>
        <label>Data:</label>
        <input type="date" id="data">
        
        <label>Tipo:</label>
        <select id="tipo">
            <option value="Entrada">Entrada</option>
            <option value="Saída">Saída</option>
        </select>
        
        <label>Descrição:</label>
        <input type="text" id="descricao">
        
        <label>Valor:</label>
        <input type="number" id="valor" step="0.01">
        
        <button onclick="adicionarMovimento()">Adicionar</button>
        <button onclick="mostrarExtrato()">Ver Extrato</button>
    </div>
    
    <!-- Tabela de Extrato (Página 2) -->
    <div id="extratoTable">
        <h2>Movimentações / Extrato</h2>
        <table id="extrato">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Tipo</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="mostrarFormulario()">Preencher Novas Movimentações</button>
        <button onclick="limparExtrato()">Limpar Extrato</button>
    </div>
</div>

<script>
// Variáveis
let saldo = 0;
let movimentos = JSON.parse(localStorage.getItem('movimentos')) || [];
saldo = parseFloat(localStorage.getItem('saldo')) || 0;

// Funções de Navegação
function mostrarFormulario() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('caixaForm').style.display = 'block';
    document.getElementById('extratoTable').style.display = 'none';
}

function mostrarExtrato() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('caixaForm').style.display = 'none';
    document.getElementById('extratoTable').style.display = 'block';
    exibirExtrato();
}

// Funções de Movimentação
function adicionarMovimento() {
    const data = document.getElementById('data').value;
    const tipo = document.getElementById('tipo').value;
    const descricao = document.getElementById('descricao').value;
    const valor = parseFloat(document.getElementById('valor').value);

    if (!data || !descricao || isNaN(valor) || valor <= 0) {
        alert("Preencha todos os campos corretamente!");
        return;
    }

    // Atualiza saldo
    saldo = tipo === "Entrada" ? saldo + valor : saldo - valor;

    // Adiciona movimento
    movimentos.push({ data, tipo, descricao, valor, saldo });

    // Salva no localStorage
    localStorage.setItem('movimentos', JSON.stringify(movimentos));
    localStorage.setItem('saldo', saldo);

    // Limpa campos
    document.getElementById('data').value = '';
    document.getElementById('descricao').value = '';
    document.getElementById('valor').value = '';
}

// Função para exibir o extrato
function exibirExtrato() {
    const tbody = document.getElementById('extrato').getElementsByTagName('tbody')[0];
    tbody.innerHTML = ''; // Limpa o extrato

    // Exibe os movimentos
    movimentos.forEach(mov => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = mov.data;
        row.insertCell(1).innerText = mov.tipo;
        row.insertCell(2).innerText = mov.descricao;
        row.insertCell(3).innerText = parseFloat(mov.valor).toFixed(2);
        row.insertCell(4).innerText = parseFloat(mov.saldo).toFixed(2);
    });
}

// Função para limpar extrato
function limparExtrato() {
    if (confirm("Deseja realmente limpar todo o extrato?")) {
        localStorage.removeItem('movimentos');
        localStorage.removeItem('saldo');
        movimentos = [];
        saldo = 0;
        exibirExtrato();
    }
}

// Inicia com o Menu
mostrarFormulario();
</script>

</body>
</html>
